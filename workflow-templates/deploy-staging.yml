# ============================================================
# deploy-staging.yml
# Trigger: push (merge) to the `staging` branch
# Effect:  Deploys the application to the STAGING environment
#
# Usage: Copy this file to .github/workflows/deploy-staging.yml
#        in each repository. Customize the "Build & Deploy" step
#        for your stack (Docker, npm, etc.).
# ============================================================

name: Deploy → Staging

on:
  push:
    branches:
      - staging

concurrency:
  group: deploy-staging
  cancel-in-progress: false   # never cancel in-flight staging deploys

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging       # maps to the "staging" environment in repo settings

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build step (customize for your stack) ─────────────
      - name: Set up Node / Python / Java / etc.
        # Example for Node.js – replace or remove as needed:
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # ── Deploy step ────────────────────────────────────────
      # Replace this block with your actual deploy command.
      # Common options:
      #   • AWS ECS:     aws ecs update-service ...
      #   • Kubernetes:  kubectl rollout restart ...
      #   • Heroku:      git push heroku HEAD:main
      #   • Railway/Render/Fly.io: provider CLI
      - name: Deploy to Staging
        env:
          # Store all secrets in the repo / org / environment secrets
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
          STAGING_ENV_URL: ${{ vars.STAGING_ENV_URL }}
        run: |
          echo "Deploying commit ${{ github.sha }} to staging..."
          # YOUR DEPLOY COMMAND HERE
          # e.g.: ./scripts/deploy.sh staging

      # ── Notify ────────────────────────────────────────────
      - name: Post deployment status to PR / Slack (optional)
        if: always()
        run: |
          echo "Staging deploy status: ${{ job.status }}"
          # Optionally post to Slack using secrets.SLACK_WEBHOOK_URL
