name: Merge all PRs on Jira Done
run-name: "Merge PRs — ${{ inputs.jira_key }}"

on:
  workflow_dispatch:
    inputs:
      jira_key:
        description: "Jira issue key (e.g. GPDA-2778)"
        required: true
        type: string
      allowed_repos:
        description: "Comma-separated repo names to limit scope (e.g. eForms,GPEmailService). Leave empty for all repos."
        required: false
        type: string
        default: ""

jobs:

  get-linked-prs:
    runs-on: ubuntu-latest
    outputs:
      prs: ${{ steps.filter.outputs.prs }}
    steps:
      - name: Get open PRs linked to Jira issue
        id: get-prs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_MERGE }}
        run: |
          JIRA_KEY="${{ inputs.jira_key }}"

          # Search GitHub for open, non-draft PRs mentioning the Jira key in title or body
          SEARCH=$(gh api "search/issues" \
            -X GET \
            -f q="org:govpilot is:pr is:open is:unmerged $JIRA_KEY in:title,body" \
            --jq '[.items[] | select(.draft == false) | {number: .number, repo: (.repository_url | split("/") | last)}]')

          echo "PRs from GitHub search: $SEARCH"

          # For each PR, fetch the head branch and filter for release/* or hotfix/*
          PRS=$(echo "$SEARCH" | jq -c '.[]' | while IFS= read -r item; do
            NUM=$(echo "$item" | jq -r '.number')
            REPO=$(echo "$item" | jq -r '.repo')
            PR=$(gh api "repos/govpilot/$REPO/pulls/$NUM" --jq '{branch: .head.ref, draft: .draft}')
            BRANCH=$(echo "$PR" | jq -r '.branch')
            IS_DRAFT=$(echo "$PR" | jq -r '.draft')
            if [ "$IS_DRAFT" = "true" ]; then continue; fi
            if [[ "$BRANCH" == release/* ]] || [[ "$BRANCH" == hotfix/* ]]; then
              printf '{"repo":"%s","pr_number":%s,"branch":"%s"}\n' "$REPO" "$NUM" "$BRANCH"
            fi
          done | jq -sc '.')

          echo "Filtered release/hotfix PRs: $PRS"
          echo "prs=$PRS" >> $GITHUB_OUTPUT

      - name: Apply allowed_repos filter
        id: filter
        run: |
          ALLOWED="${{ inputs.allowed_repos }}"
          ALL='${{ steps.get-prs.outputs.prs }}'

          if [ -z "$ALLOWED" ]; then
            echo "prs=$ALL" >> $GITHUB_OUTPUT
          else
            FILTERED=$(echo "$ALL" | jq -c --arg allowed "$ALLOWED" '[
              .[] | select(
                .repo as $r |
                ($allowed | split(",") | map(ltrimstr(" ") | rtrimstr(" ")) | index($r)) != null
              )
            ]')
            echo "Filtered PRs: $FILTERED"
            echo "prs=$FILTERED" >> $GITHUB_OUTPUT
          fi

      - name: Fail if no open PRs found
        if: steps.filter.outputs.prs == '[]' || steps.filter.outputs.prs == ''
        run: |
          echo "No open PRs found for ${{ inputs.jira_key }}"
          exit 1

  await-approval:
    needs: get-linked-prs
    runs-on: ubuntu-latest
    environment: production-approval
    steps:
      - name: PRs pending merge for ${{ inputs.jira_key }}
        run: |
          echo "The following PRs will be merged upon approval:"
          echo '${{ needs.get-linked-prs.outputs.prs }}' \
            | jq -r '.[] | "  - https://github.com/govpilot/\(.repo)/pull/\(.pr_number)  [\(.branch)]"'

  merge:
    needs: [get-linked-prs, await-approval]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pr: ${{ fromJson(needs.get-linked-prs.outputs.prs) }}
      fail-fast: false
    steps:
      - name: Version check — ${{ matrix.pr.repo }}
        id: version-check
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_MERGE }}
        run: |
          BRANCH="${{ matrix.pr.branch }}"
          PR_VERSION=$(echo "$BRANCH" | sed 's|^release/||;s|^hotfix/||')

          # Get all tags, strip v prefix, sort by version, take highest
          LATEST_TAG=$(gh api repos/govpilot/${{ matrix.pr.repo }}/tags \
            --jq '.[].name' 2>/dev/null | sed 's/^v//' | sort -V | tail -1)

          echo "PR branch version:  $PR_VERSION"
          echo "Latest tag on repo: ${LATEST_TAG:-"(none)"}"

          if [ -z "$LATEST_TAG" ]; then
            echo "No tags found — skipping version check."
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # If LATEST_TAG > PR_VERSION, skip this repo
          HIGHER=$(printf '%s\n%s' "$LATEST_TAG" "$PR_VERSION" | sort -V | tail -1)
          if [ "$HIGHER" = "$LATEST_TAG" ] && [ "$LATEST_TAG" != "$PR_VERSION" ]; then
            echo "SKIP: ${{ matrix.pr.repo }} already has $LATEST_TAG on main, which is newer than $BRANCH ($PR_VERSION)."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Version check passed: $PR_VERSION >= $LATEST_TAG"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge PR — ${{ matrix.pr.repo }} #${{ matrix.pr.pr_number }}
        if: steps.version-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_MERGE }}
        run: |
          gh pr merge ${{ matrix.pr.pr_number }} \
            --repo govpilot/${{ matrix.pr.repo }} \
            --merge \
            --admin \
            --subject "chore(release): ${{ inputs.jira_key }} release to production [skip ci]"
